<main class="note" lang="de">
  <section class="target-block">
    <div class="target-line">
      <div class="target">{{Target}}</div>
      {{#WordAudio}}<span class="audio-control word-audio" title="Play word">{{WordAudio}}</span>{{/WordAudio}}
    </div>
  </section>

  {{#SentenceAudio}}
  <section class="audio-row" aria-label="German sentence audio">
    <span class="audio-caption">Example sentence</span>
    <span class="audio-control">{{SentenceAudio}}</span>
  </section>
  {{/SentenceAudio}}
</main>
