<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>German Core — Card Review</title>
  <link rel="stylesheet" href="../prototype/anki/style.css">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <header class="toolbar">
    <div class="brand">
      <strong>German Core</strong>
      <span>Card review</span>
    </div>
    <nav class="controls" aria-label="Card controls">
      <button id="previous" type="button" title="Previous card (←)">←</button>
      <label class="picker-label" for="card-picker">Card</label>
      <select id="card-picker" aria-label="Select card"></select>
      <button id="next" type="button" title="Next card (→)">→</button>
      <button id="theme" type="button" title="Toggle dark mode (D)">◐</button>
    </nav>
  </header>

  <main class="review-shell">
    <aside class="review-meta" aria-live="polite">
      <span id="counter"></span>
      <span id="status"></span>
    </aside>
    <section id="card-stage" class="card-stage card" aria-live="polite"></section>
    <div class="review-actions">
      <button id="flip" class="flip-button" type="button">Show answer</button>
      <span class="shortcut-help">Space: flip · ←/→: navigate · D: theme</span>
    </div>
  </main>

  <template id="front-template">
    <main class="note" lang="de">
      <section class="target-block"><div class="target"></div></section>
      <section class="audio-row muted-audio" aria-label="Audio unavailable"><span>Audio not added yet</span></section>
    </main>
  </template>

  <template id="back-template">
    <main class="note answer" lang="de">
      <section class="target-block compact">
        <div class="target"></div>
        <div class="part-of-speech"></div>
      </section>
      <details class="reveal meaning-reveal">
        <summary>Show meaning</summary>
        <div class="reveal-content" lang="en"><div class="meaning"></div></div>
      </details>
      <section class="sentence-block"><div class="german-sentence"></div></section>
      <details class="reveal translation-reveal">
        <summary>Show translation</summary>
        <div class="reveal-content" lang="en"><div class="english-sentence"></div></div>
      </details>
      <details class="reveal secondary extra-examples">
        <summary>More examples</summary><div class="reveal-content examples-list"></div>
      </details>
      <details class="reveal secondary forms-section">
        <summary>Forms and grammar</summary><div class="reveal-content forms"></div>
      </details>
      <details class="reveal secondary">
        <summary>Usage note</summary><div class="reveal-content usage" lang="en"></div>
      </details>
    </main>
  </template>
  <script src="app.js"></script>
</body>
</html>
